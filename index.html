  <style>
    :root {
      --bg: #ffffff;
      --text: #1d1d1f;
      --text-soft: #86868b;
      color-scheme: light dark;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #000000;
        --text: #f5f5f7;
        --text-soft: #86868b;
      }
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      display: grid;
      place-items: center;
      min-height: 100%;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI",
        system-ui, Roboto, Helvetica, Arial, sans-serif;
      text-align: center;
      -webkit-font-smoothing: antialiased;
      transition: background 0.3s ease, color 0.3s ease;
    }

    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 420px;
    }

    .logo {
      width: 56px;
      height: 56px;
      margin-bottom: 28px;
      color: var(--text);
    }
    .logo svg {
      width: 100%;
      height: 100%;
      fill: currentColor;
    }

    h1 {
      font-size: clamp(1.5rem, 4vw, 1.9rem);
      font-weight: 600;
      letter-spacing: -0.01em;
      margin: 0 0 10px;
    }

    p {
      font-size: 1rem;
      line-height: 1.5;
      color: var(--text-soft);
      margin: 0;
    }

    .footer {
      margin-top: 56px;
      font-size: 0.75rem;
      color: var(--text-soft);
      opacity: 0.6;
      letter-spacing: 0.01em;
    }
  </style>
</head>
<body>
  <main>
    <div class="logo" aria-hidden="true">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M20.6 11.2c-.9 1-2.3 1.7-3.6 1.6-.2-1.3.5-2.7 1.3-3.6.9-1 2.4-1.7 3.6-1.8.1 1.4-.4 2.8-1.3 3.8Zm1.3 2.1c-2-.1-3.7 1.1-4.6 1.1-1 0-2.4-1.1-4-1-2 0-3.9 1.2-4.9 3-2.1 3.6-.5 9 1.5 12 1 1.4 2.1 3 3.6 3 1.4-.1 2-.9 3.7-.9s2.2.9 3.7.9c1.5 0 2.5-1.4 3.5-2.8 1.1-1.6 1.5-3.1 1.6-3.2-.1 0-3.1-1.2-3.1-4.6 0-2.9 2.3-4.2 2.4-4.3-1.3-1.9-3.3-2.1-3.9-2.2Z" />
      </svg>
    </div>
    <h1>We'll be back soon.</h1>
    <p>
      Staff Chat is taking a short break while we work on something better.
      Thanks for your patience.
    </p>
    <div class="footer">Staff Chat · BigHappySmiley</div>
  </main>
</body>
</html>
