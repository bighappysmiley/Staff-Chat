<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staff Chat — We'll be back soon</title>
  <meta name="description" content="Staff Chat is taking a short break. Come back soon." />
  <meta name="robots" content="noindex" />
  <link
    rel="icon"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%234f5ae8'/%3E%3Cpath fill='%23fff' d='M9 8h14a3 3 0 0 1 3 3v8a3 3 0 0 1-3 3h-7l-5 4v-4H9a3 3 0 0 1-3-3v-8a3 3 0 0 1 3-3Z'/%3E%3C/svg%3E"
  />
  <style>
    :root {
      --bg: #f5f5f7;
      --text: #1d1d1f;
      --text-soft: #6e6e73;
      --card: #ffffff;
      --border: rgba(0, 0, 0, 0.06);
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
      color-scheme: light dark;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #000000;
        --text: #f5f5f7;
        --text-soft: #a1a1a6;
        --card: #1c1c1e;
        --border: rgba(255, 255, 255, 0.08);
        --shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      }
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      display: grid;
      place-items: center;
      min-height: 100%;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI",
        system-ui, Roboto, Helvetica, Arial, sans-serif;
      text-align: center;
      -webkit-font-smoothing: antialiased;
    }

    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 480px;
    }

    .mark {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      background: linear-gradient(135deg, #4f5ae8, #7a5cf0);
      position: relative;
      margin-bottom: 32px;
      box-shadow: var(--shadow);
    }
    .mark::after {
      content: "";
      position: absolute;
      inset: 19px;
      border-radius: 50%;
      background: #fff;
      box-shadow: -9px 0 0 -3px #fff, 9px 0 0 -3px #fff;
    }

    h1 {
      font-size: clamp(1.75rem, 4vw, 2.5rem);
      font-weight: 600;
      letter-spacing: -0.02em;
      margin: 0 0 14px;
    }

    p {
      font-size: 1.05rem;
      line-height: 1.55;
      color: var(--text-soft);
      margin: 0;
    }

    .footer {
      margin-top: 40px;
      font-size: 0.85rem;
      color: var(--text-soft);
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <main>
    <div class="mark" aria-hidden="true"></div>
    <h1>We'll be back soon.</h1>
    <p>
      Staff Chat is taking a short break while we work on something better.
      Thanks for your patience — come back soon!
    </p>
    <div class="footer">Staff Chat · BigHappySmiley</div>
  </main>
</body>
</html>
